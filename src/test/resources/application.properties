jwt.secret=abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz
jwt.issuer=medicology-auth
jwt.audience=medicology-api
frontend.url=http://localhost:3000

refresh.token.expiration=5400000
access.token.expiration=1800000
verify.token.expiration=36
reset.token.expiration=36

spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.security.oauth2.client.registration.google.client-id=test-google-client
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.facebook.client-id=test-facebook-client
spring.security.oauth2.client.registration.facebook.client-secret=test-facebook-secret
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

sendgrid.api.key=test-sendgrid-key
sendgrid.from-email=test@example.com

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
